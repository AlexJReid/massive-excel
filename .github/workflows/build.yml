name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
  
    - name: Azure Login
      if: startsWith(github.ref, 'refs/tags/v')
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install Trusted Signing Client
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        nuget install Microsoft.ArtifactSigning.Client -OutputDirectory .\packages
        
    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.1

    - name: Build XLL
      run: |
        zig build --release=small

    - name: Sign XLLs
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $dlib = Get-ChildItem -Path ".\packages" -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
          Where-Object { $_.FullName -like "*x64*" } |
          Select-Object -First 1 -ExpandProperty FullName

        Write-Host "DLib path: $dlib"

        $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
          Sort-Object { [version]($_.Directory.Parent.Name) } -Descending |
          Select-Object -First 1 -ExpandProperty FullName

        Write-Host "SignTool path: $signtool"

        & $signtool sign /v /fd SHA256 `
          /tr "http://timestamp.acs.microsoft.com" /td SHA256 `
          /dlib "$dlib" `
          /dmdf ".\signing-metadata.json" `
          "zig-out/lib/massive_excel.xll"

    - name: Upload XLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: massive_excel
        path: zig-out/lib/massive_excel.xll
        if-no-files-found: error

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          zig-out/lib/massive_excel.xll
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
